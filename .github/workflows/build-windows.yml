name: Build + Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build JAR and prepare dist folder
        shell: cmd
        run: |
          set NO_PAUSE=1
          call "#install_build_tools.bat"
          call "#build.bat"
          
          mkdir dist
          copy /Y index.html dist\index.html
          copy /Y README.md dist\README.md
          copy /Y build\libs\meteor-RyanWare-0.1.jar dist\RyanWare.jar
          mkdir dist\src\main\resources\icons
          xcopy /E /I /Y src\main\resources\icons dist\src\main\resources\icons

      - name: Upload Pages Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        uses: actions/deploy-pages@v4