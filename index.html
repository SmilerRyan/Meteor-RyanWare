<!DOCTYPE html>
<html xmlns:og="http://ogp.me/ns#" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta property="og:description" content="A powerful addon for Meteor Client designed to make things easier.">
        <meta property="og:image" content="https://smilerryan.github.io/Meteor-RyanWare/knowledge_book.png" />
        <meta property="og:site_name" content="RyanWare Meteor Addon">
        <meta property="og:title" content="RyanWare Meteor Addon" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://smilerryan.github.io/Meteor-RyanWare/" />
        <meta name="theme-color" content="#008000">
        <meta http-equiv="Cache-Control" content="no-cache">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="knowledge_book.png" />
        <title>RyanWare Meteor Addon</title>
        <style>
            body {
                margin: 0;
                background: #0d0d0d;
                color: #e6e6e6;
                font-family: Arial, sans-serif;
                padding: 40px;
            }
            .container {
                max-width: 850px;
                margin: auto;
                background: #121212;
                padding: 30px;
                border-radius: 10px;
            }
            pre {
                background: #0a0a0a;
                padding: 10px;
                border-radius: 6px;
                overflow-x: auto;
            }
            a {
                cursor: pointer;
                color: #8174a9;
                font-weight: bold;
                text-decoration: none;
            }
            html {
                scroll-behavior: smooth;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div id="content"></div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script>
            fetch("README.md").then(res => res.text()).then(md => {
                document.getElementById("content").innerHTML = marked.parse(md);
            });
        </script>
    </body>
</html>
